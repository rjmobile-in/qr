<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compact White Staff ID QR Stickers</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Setup page for A4 Print */
        @page {
            size: A4 portrait;
            margin: 10mm;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: #e2e8f0; /* Soft gray for screen viewing */
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        
        /* Print Controls (Hidden when printing or saving to PDF) */
        .no-print {
            text-align: center;
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #cbd5e1;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .print-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background: #3B82F6;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .print-btn:hover { background: #2563EB; }
        .print-note {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        /* Container simulating A4 page on screen */
        .page-container {
            max-width: 210mm;
            margin: 0 auto;
            background: #ffffff;
            padding: 10mm;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Grid layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 columns */
            gap: 6px; 
            width: 100%;
        }

        /* Sticker Card */
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1.5px dashed #000; /* Scissor cut line */
            padding: 10px 4px;
            page-break-inside: avoid; /* Prevents cards from splitting across 2 pages */
            background: #ffffff; 
            color: #000000; 
            border-radius: 4px; 
            box-sizing: border-box;
            width: 100%;
            height: 55mm; 
        }
        
        /* Top section: Logo and Name */
        .logo {
            width: 48px; 
            height: 48px;
            border-radius: 50%;
            background-color: white;
            object-fit: contain;
            border: 1.5px solid #e2e8f0; 
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .name { 
            font-weight: 800; 
            font-size: 13px; 
            text-align: center;
            margin-bottom: 8px;
            flex-shrink: 0;
            letter-spacing: -0.3px;
        }
        
        /* QR Section */
        .qrs-container {
            display: flex;
            flex-direction: column; 
            align-items: center;
            width: 100%;
        }
        .qr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0; 
        }
        .qr-code-wrapper {
            background: white; 
            padding: 0;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .qr-code-wrapper img, .qr-code-wrapper canvas {
            width: 90px !important;
            height: 90px !important;
        }

        /* Optimize styling strictly for PDF export/print */
        @media print {
            body { 
                background: #ffffff; 
                padding: 0;
                margin: 0;
            }
            .no-print { display: none !important; }
            .page-container {
                box-shadow: none;
                margin: 0;
                padding: 0;
                width: 100%;
                max-width: none;
            }
        }
    </style>
</head>
<body>

    <!-- Controls to trigger the save to PDF -->
    <div class="no-print">
        <button class="print-btn" onclick="window.print()">Save as PDF</button>
        <div class="print-note">When the dialog opens, select <strong>"Save as PDF"</strong> as your destination.</div>
    </div>

    <!-- The actual print content -->
    <div class="page-container">
        <div class="grid" id="qr-grid"></div>
    </div>

    <script>
        // Formatted with proper Title Case per your list
        const staffNames = [
            "Aman", "Harsh Kejriwal", "Kamal Murarka", "Rajesh", "Ronak",
            "Manish Daga", "Ayush", "Farhan", "Girish", "Harsh Dubay",
            "Harsh Verma", "Krishna Singh", "Krishna Choubey", "Lokesh",
            "Manish Soni", "Mohit Tamrayat", "Prakash", "Prashant", "Rakesh",
            "Ram", "Sameer Singh", "Sonu", "Subhash", "Sunil", "Vivek",
            "Yash", "Deepak", "Gaurav", "Vinod", "Sachin", "Ankur",
            "Sanju", "Krishna Soni", "Pawan"
        ];

        const socialUrl = "https://rjmobile-in.github.io/social?staff=";
        
        // Ensure your logo file is named logo.png and is in the same folder
        const logoUrl = "logo.png";

        const grid = document.getElementById("qr-grid");

        staffNames.forEach(name => {
            const card = document.createElement("div");
            card.className = "card";

            const logo = document.createElement("img");
            logo.className = "logo";
            logo.src = logoUrl;
            
            const nameLabel = document.createElement("div");
            nameLabel.className = "name";
            nameLabel.innerText = name; // Display name with spaces intact
            
            card.appendChild(logo);
            card.appendChild(nameLabel);

            const qrsContainer = document.createElement("div");
            qrsContainer.className = "qrs-container";

            const qrBoxSocial = document.createElement("div");
            qrBoxSocial.className = "qr-box";
            
            const qrWrapSocial = document.createElement("div");
            qrWrapSocial.className = "qr-code-wrapper";

            qrBoxSocial.appendChild(qrWrapSocial);
            qrsContainer.appendChild(qrBoxSocial);

            card.appendChild(qrsContainer);
            grid.appendChild(card);

            // Replace spaces with hyphens ONLY for the URL string
            const linkName = name.replace(/\s+/g, '-');

            // Generate extremely high-resolution QR Code for crisp PDF saving
            new QRCode(qrWrapSocial, {
                text: socialUrl + encodeURIComponent(linkName),
                width: 400,  
                height: 400, 
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H 
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compact White Staff ID QR Stickers</title>
    <!-- QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- HTML2Canvas for PNG Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Setup page for A4 Print */
        @page {
            size: A4 portrait;
            margin: 0; /* Margin handled by container padding */
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: #e2e8f0; 
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        
        /* Print Controls (Hidden when printing or saving to PDF) */
        .no-print {
            text-align: center;
            padding: 24px;
            background: #ffffff;
            border-bottom: 1px solid #cbd5e1;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .btn-group {
            display: flex;
            gap: 16px;
        }
        .action-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .pdf-btn { background: #3B82F6; }
        .pdf-btn:hover { background: #2563EB; }
        .png-btn { background: #10B981; }
        .png-btn:hover { background: #059669; }
        
        .print-note {
            font-size: 13px;
            color: #64748b;
        }

        /* Container exactly simulating A4 page dimensions */
        .page-container {
            width: 210mm;
            height: 297mm;
            margin: 0 auto 20px auto;
            background: #ffffff;
            padding: 10mm;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            page-break-after: always;
            position: relative;
        }
        .page-container:last-child {
            page-break-after: auto;
        }

        /* Grid layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 columns */
            gap: 6px; 
            width: 100%;
        }

        /* Sticker Card */
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1.5px dashed #000; /* Scissor cut line */
            padding: 8px 4px;
            page-break-inside: avoid;
            background: #ffffff; 
            color: #000000; 
            border-radius: 4px; 
            box-sizing: border-box;
            width: 100%;
            height: 54mm; /* Perfectly calculated to fit 5 rows per A4 page */
        }
        
        .name { 
            font-weight: 800; 
            font-size: 17px; 
            line-height: 1.15;
            text-align: center;
            margin-bottom: 6px; 
            flex-shrink: 0;
            letter-spacing: -0.3px;
            width: 100%;
            overflow-wrap: break-word; 
        }
        
        /* QR Section */
        .qrs-container {
            display: flex;
            flex-direction: column; 
            align-items: center;
            width: 100%;
        }
        .qr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0; 
        }
        .qr-code-wrapper {
            background: white; 
            padding: 0;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .qr-code-wrapper img, .qr-code-wrapper canvas {
            width: 120px !important;
            height: 120px !important;
        }

        /* Optimize styling strictly for PDF export/print */
        @media print {
            body { 
                background: #ffffff; 
            }
            .no-print { display: none !important; }
            .page-container {
                box-shadow: none;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Controls to trigger the save to PDF or PNG -->
    <div class="no-print">
        <div class="btn-group">
            <button class="action-btn pdf-btn" onclick="window.print()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Save as PDF
            </button>
            <button class="action-btn png-btn" id="png-btn" onclick="saveAsPNG()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Save as PNG Images
            </button>
        </div>
        <div class="print-note">To save as PDF, select <strong>"Save as PDF"</strong> as your destination in the print dialog.</div>
    </div>

    <!-- Wrapper where our dynamic A4 pages will be injected -->
    <div id="pages-wrapper"></div>

    <script>
        // Formatted with proper Title Case
        const staffNames = [
            "Aman", "Harsh Kejriwal", "Kamal Murarka", "Rajesh", "Ronak",
            "Manish Daga", "Ayush", "Farhan", "Girish", "Harsh Dubay",
            "Harsh Verma", "Krishna Singh", "Krishna Choubey", "Lokesh",
            "Manish Soni", "Mohit Tamrayat", "Prakash", "Prashant", "Rakesh",
            "Ram", "Sameer Singh", "Sonu", "Subhash", "Sunil", "Vivek",
            "Yash", "Deepak", "Gaurav", "Vinod", "Sachin", "Ankur",
            "Sanju", "Krishna Soni", "Pawan", "Sufiyan"
        ];

        const socialUrl = "https://rjmobile-in.github.io/social?staff=";
        const wrapper = document.getElementById("pages-wrapper");

        // 5 columns * 5 rows = 25 stickers per page (Perfectly fits A4 without overflow)
        const ITEMS_PER_PAGE = 25; 
        
        // Chunk the array into pages
        const pages = [];
        for (let i = 0; i < staffNames.length; i += ITEMS_PER_PAGE) {
            pages.push(staffNames.slice(i, i + ITEMS_PER_PAGE));
        }

        // Generate pages and grid
        pages.forEach((pageNames, pageIndex) => {
            // Create A4 Container
            const pageContainer = document.createElement("div");
            pageContainer.className = "page-container";
            pageContainer.id = `page-container-${pageIndex + 1}`;

            // Create Grid inside
            const grid = document.createElement("div");
            grid.className = "grid";

            // Add cards to grid
            pageNames.forEach(name => {
                const card = document.createElement("div");
                card.className = "card";
                
                const nameLabel = document.createElement("div");
                nameLabel.className = "name";
                nameLabel.innerText = name; 
                
                card.appendChild(nameLabel);

                const qrsContainer = document.createElement("div");
                qrsContainer.className = "qrs-container";

                const qrBoxSocial = document.createElement("div");
                qrBoxSocial.className = "qr-box";
                
                const qrWrapSocial = document.createElement("div");
                qrWrapSocial.className = "qr-code-wrapper";

                qrBoxSocial.appendChild(qrWrapSocial);
                qrsContainer.appendChild(qrBoxSocial);

                card.appendChild(qrsContainer);
                grid.appendChild(card);

                // Replace spaces with hyphens ONLY for the URL string
                const linkName = name.replace(/\s+/g, '-');

                // Generate extremely high-resolution QR Code
                new QRCode(qrWrapSocial, {
                    text: socialUrl + encodeURIComponent(linkName),
                    width: 400,  
                    height: 400, 
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H 
                });
            });

            pageContainer.appendChild(grid);
            wrapper.appendChild(pageContainer);
        });

        // Function to capture multiple page-containers and save them as high-quality PNGs
        async function saveAsPNG() {
            const btn = document.getElementById('png-btn');
            const originalContent = btn.innerHTML;
            
            // Show loading state
            btn.innerHTML = '<svg class="animate-spin" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating PNGs...';
            btn.disabled = true;

            const pageElements = document.querySelectorAll('.page-container');

            // Wait a tiny bit to allow UI to update
            await new Promise(r => setTimeout(r, 150));

            try {
                for (let i = 0; i < pageElements.length; i++) {
                    const canvas = await html2canvas(pageElements[i], {
                        scale: 3, // 3x resolution for crisp high-quality print
                        backgroundColor: "#ffffff",
                        useCORS: true
                    });
                    
                    // Create an anchor element and trigger download
                    const link = document.createElement('a');
                    link.download = `Staff_QR_Stickers_Page_${i + 1}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    // Pause slightly between downloads to prevent browser from blocking them
                    await new Promise(r => setTimeout(r, 600)); 
                }
            } catch (err) {
                console.error("Error generating PNG:", err);
                alert("There was an error generating the PNGs.");
            }

            // Restore button state
            btn.innerHTML = originalContent;
            btn.disabled = false;
        }
    </script>
</body>
</html>
